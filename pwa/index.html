<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4C3D75">
  <title>Shipyard</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --night: #121212;
      --ultraviolet: #4C3D75;
      --amethyst: #8A6FD6;
      --indigo: #AC8FFE;
      --lavender: #E8E8F8;
      --dimgray: #6E6E80;
      --green: #1D9E75;
      --amber: #BA7517;
      --red: #E24B4A;
      --font-heading: 'Cinzel', serif;
      --font-body: 'Source Serif 4', serif;
      --font-mono: 'Courier New', monospace;
    }
    html, body { height: 100%; background: var(--night); color: var(--lavender); font-family: var(--font-body); font-size: 14px; line-height: 1.5; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    #topbar { background: var(--ultraviolet); border-bottom: 1px solid var(--amethyst); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    #main { flex: 1; padding: 24px; overflow-y: auto; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .app-logo { width: 32px; height: 32px; background: var(--night); border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .app-logo img { width: 24px; height: 24px; object-fit: contain; display: block; }
    .app-title { font-family: var(--font-heading); font-size: 18px; font-weight: 600; color: var(--lavender); letter-spacing: 0.05em; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn { width: 36px; height: 36px; background: transparent; border: 1px solid var(--ultraviolet); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--lavender); transition: border-color 0.15s, background 0.15s; }
    .icon-btn:hover { border-color: var(--amethyst); background: rgba(172,143,254,0.08); }
    .icon-btn svg { width: 16px; height: 16px; }
    #search-wrap { margin-bottom: 20px; }
    #search { width: 100%; background: var(--ultraviolet); border: 1px solid var(--ultraviolet); border-radius: 8px; padding: 10px 14px; color: var(--lavender); font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 0.15s; }
    #search::placeholder { color: var(--dimgray); }
    #search:focus { border-color: var(--amethyst); }
    .server-section { margin-bottom: 28px; }
    .server-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .server-name { font-family: var(--font-heading); font-size: 11px; font-weight: 600; color: var(--dimgray); text-transform: uppercase; letter-spacing: 0.1em; }
    .server-summary { font-size: 11px; color: var(--dimgray); background: rgba(76,61,117,0.4); padding: 2px 8px; border-radius: 4px; }
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin: 0; padding: 0; border: none; }
    .tile { background: var(--ultraviolet); border: 1px solid var(--ultraviolet); border-radius: 8px; padding: 14px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; position: relative; }
    .tile:hover:not(.tile-disabled) { border-color: var(--indigo); background: rgba(172,143,254,0.08); }
    .tile-disabled { opacity: 0.4; cursor: not-allowed; }
    .tile-status-green { border-left: 3px solid #1D9E75 !important; }
    .tile-status-amber { border-left: 3px solid #BA7517 !important; }
    .tile-status-red { border-left: 3px solid #E24B4A !important; }
    .tile-status-unknown { border-left: 3px solid #6E6E80 !important; }
    .tile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .tile-top-right { display: flex; align-items: center; gap: 8px; }
    .tile-logo-wrap { width: 36px; height: 36px; background: rgba(13,13,26,0.6); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .tile-logo-img { width: 32px; height: 32px; object-fit: contain; display: block; }
    .tile-logo-fallback { width: 36px; height: 36px; background: #4C3D75; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); color: #AC8FFE; font-size: 13px; font-weight: 600; text-transform: uppercase; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); }
    .dot-amber { background: var(--amber); }
    .dot-red { background: var(--red); }
    .dot-unknown { background: var(--dimgray); }
    .tile-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .tile:hover .tile-actions { opacity: 1; }
    .tile-action-btn { width: 22px; height: 22px; background: rgba(18,18,18,0.6); border: 1px solid var(--amethyst); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--lavender); }
    .tile-action-btn:hover { background: var(--amethyst); }
    .tile-name { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--lavender); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tile-addr { font-family: var(--font-mono); font-size: 11px; color: var(--dimgray); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .port-badge { background: #4C3D75; color: #AC8FFE; font-family: var(--font-mono); font-size: 11px; padding: 2px 6px; border-radius: 4px; }
    .no-ui-badge { font-size: 10px; color: var(--dimgray); background: rgba(110,110,128,0.15); padding: 1px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }
    #statusbar { background: var(--ultraviolet); border-top: 1px solid var(--amethyst); padding: 8px 24px; display: flex; align-items: center; gap: 20px; font-size: 11px; color: var(--dimgray); }
    .sb-item { display: flex; align-items: center; gap: 5px; }
    #last-check { margin-left: auto; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(18,18,18,0.85); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--ultraviolet); border: 1px solid var(--amethyst); border-radius: 12px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--amethyst); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: var(--font-heading); font-size: 14px; font-weight: 600; color: var(--lavender); letter-spacing: 0.04em; }
    .modal-close { background: transparent; border: none; color: var(--dimgray); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
    .modal-close:hover { color: var(--lavender); }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--amethyst); display: flex; justify-content: flex-end; gap: 8px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; color: var(--dimgray); margin-bottom: 5px; font-family: var(--font-body); }
    .form-input, .form-select { width: 100%; background: var(--night); border: 1px solid var(--amethyst); border-radius: 8px; padding: 8px 10px; color: var(--lavender); font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 0.15s; }
    .form-input:focus, .form-select:focus { border-color: var(--indigo); }
    .form-error { margin-top: 4px; color: var(--red); font-size: 11px; }
    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--lavender); cursor: pointer; }
    .form-checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--lavender); cursor: pointer; }
    .btn { padding: 8px 18px; border-radius: 8px; font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: all 0.15s; border: 1px solid #4C3D75; }
    .btn-primary { background: var(--indigo); color: var(--night); font-weight: 600; }
    .btn-primary:hover { background: var(--amethyst); border-color: var(--amethyst); }
    .btn-secondary { background: transparent; color: var(--lavender); }
    .btn-secondary:hover { background: rgba(172,143,254,0.08); border-color: var(--amethyst); }
    .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-danger:hover { background: rgba(226,74,74,0.1); }
    .settings-section { margin-bottom: 24px; }
    .settings-section-title { font-family: var(--font-heading); font-size: 11px; color: var(--dimgray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(76,61,117,0.6); }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(76,61,117,0.3); font-size: 13px; }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-actions { display: flex; gap: 6px; }
    .help-section { margin-bottom: 24px; }
    .help-heading { font-family: var(--font-heading); font-size: 13px; font-weight: 600; color: var(--indigo); margin-bottom: 8px; letter-spacing: 0.04em; }
    .help-body { font-size: 13px; color: var(--lavender); line-height: 1.7; }
    #toast { position: fixed; bottom: 60px; right: 24px; background: var(--ultraviolet); border: 1px solid var(--amethyst); border-radius: 8px; padding: 10px 16px; font-size: 12px; color: var(--lavender); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="topbar-left">
      <div class="app-logo"><img src="/icon-192.png" alt="Shipyard icon"></div>
      <span class="app-title">Shipyard</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btn-refresh" title="Refresh health checks">↺</button>
      <button class="icon-btn" id="btn-add" title="Add application">＋</button>
      <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
      <button class="icon-btn" id="btn-help" title="Help & documentation">?</button>
    </div>
  </header>
  <main id="main">
    <div id="search-wrap">
      <input type="text" id="search" placeholder="Search applications..." autocomplete="off">
    </div>
    <div id="server-list"></div>
  </main>
  <footer id="statusbar">
    <div class="sb-item"><div class="status-dot dot-green"></div><span id="count-green">0</span> online</div>
    <div class="sb-item"><div class="status-dot dot-amber"></div><span id="count-amber">0</span> degraded</div>
    <div class="sb-item"><div class="status-dot dot-red"></div><span id="count-red">0</span> offline</div>
    <div id="last-check">—</div>
  </footer>
</div>

<div class="modal-overlay" id="modal-app">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-app-title">Add application</span>
      <button class="modal-close" id="modal-app-close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="app-original-name">
      <input type="hidden" id="app-original-server">
      <div class="form-group"><label class="form-label">Application name</label><input type="text" class="form-input" id="app-name"><div class="form-error" id="err-app-name"></div></div>
      <div class="form-group"><label class="form-label">Server</label><select class="form-select" id="app-server"></select><div class="form-error" id="err-app-server"></div></div>
      <div class="form-group"><label class="form-label">IP address</label><input type="text" class="form-input" id="app-ip"><div class="form-error" id="err-app-ip"></div></div>
      <div class="form-group"><label class="form-label">Port</label><input type="number" class="form-input" id="app-port" min="1" max="65535"><div class="form-error" id="err-app-port"></div></div>
      <div class="form-group">
        <label class="form-label">Protocol</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="app-protocol" value="http" checked> http</label>
          <label class="radio-label"><input type="radio" name="app-protocol" value="https"> https</label>
          <label class="radio-label"><input type="radio" name="app-protocol" value="tcp"> tcp (no UI)</label>
          <label class="radio-label"><input type="radio" name="app-protocol" value="udp"> udp (no UI)</label>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Path suffix (optional)</label><input type="text" class="form-input" id="app-path" placeholder="/admin"></div>
      <div class="form-group"><label class="form-checkbox"><input type="checkbox" id="app-enabled" checked> Enabled</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-app-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-app-save">Save application</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-settings">
  <div class="modal" style="width: 640px;">
    <div class="modal-header"><span class="modal-title">Settings</span><button class="modal-close" id="modal-settings-close">&times;</button></div>
    <div class="modal-body" id="settings-body"></div>
    <div class="modal-footer"><button class="btn btn-secondary" id="modal-settings-cancel">Cancel</button><button class="btn btn-primary" id="modal-settings-save">Save settings</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-help">
  <div class="modal" style="width: 700px;">
    <div class="modal-header"><span class="modal-title">Help & documentation</span><button class="modal-close" id="modal-help-close">&times;</button></div>
    <div class="modal-body" id="help-body"></div>
  </div>
</div>

<div id="toast"></div>

<script src="/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
